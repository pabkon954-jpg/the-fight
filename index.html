<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>IO Game</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #111;
        font-family: sans-serif;
        user-select: none;
    }

    /* ============ MENU (방 생성/입장) ============ */
    #menu {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 16px;
        color: white;
        z-index: 20;
    }

    #menu button, #menu input {
        font-size: 18px;
        padding: 10px 16px;
        border-radius: 6px;
        border: none;
    }

    #menu button {
        background: #4a4a4a;
        color: white;
        cursor: pointer;
    }

    #menu button:hover {
        background: #666;
    }

    /* ============ LOBBY (대기/캐릭터 선택) ============ */
    #lobby {
        position: fixed;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        color: white;
        z-index: 15;
        padding: 30px;
        box-sizing: border-box;
    }

    #lobbyRoomCode {
        font-size: 22px;
        margin-bottom: 20px;
    }

    #lobbyMain {
        display: flex;
        gap: 40px;
        width: 100%;
        max-width: 900px;
        justify-content: center;
    }

    /* 캐릭터 선택 카드 영역 */
    #characterSelect {
        display: flex;
        gap: 20px;
    }

    .char-card {
        width: 140px;
        padding: 16px;
        border: 3px solid #444;
        border-radius: 10px;
        background: #222;
        cursor: pointer;
        text-align: center;
        transition: border-color 0.15s, transform 0.1s;
    }

    .char-card:hover {
        transform: translateY(-3px);
    }

    .char-card.selected {
        border-color: #ffd23f;
    }

    .char-swatch {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        margin: 0 auto 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .char-swatch svg {
        width: 100%;
        height: 100%;
    }

    .char-name {
        font-weight: bold;
        margin-bottom: 6px;
    }

    .char-stats {
        font-size: 12px;
        color: #aaa;
        line-height: 1.4;
    }

    /* 대기 인원 목록 */
    #playerList {
        width: 220px;
        background: #1c1c1c;
        border-radius: 10px;
        padding: 16px;
    }

    #playerList h3 {
        margin-top: 0;
        font-size: 16px;
        color: #ccc;
    }

    .player-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 6px;
        border-bottom: 1px solid #333;
        font-size: 14px;
    }

    .player-row .host-tag {
        color: #ffd23f;
        font-size: 11px;
        margin-left: 4px;
    }

    .player-row .ready-tag {
        font-size: 12px;
    }

    .ready-tag.yes { color: #4caf50; }
    .ready-tag.no { color: #888; }

    #startBtn {
        margin-top: 24px;
        font-size: 20px;
        padding: 12px 30px;
        border-radius: 8px;
        border: none;
        background: #4caf50;
        color: white;
        cursor: pointer;
    }

    #startBtn:disabled {
        background: #555;
        cursor: not-allowed;
    }

    #lobbyMessage {
        margin-top: 10px;
        color: #ff6b6b;
        height: 20px;
        font-size: 14px;
    }

    /* ============ GAME ============ */
    #player {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: yellow;
        position: absolute;
        z-index: 1;
        background-size: cover;
        background-position: center;
    }

    /* 맵 바닥 타일 패턴 */
    #mapBackground {
        position: absolute;
        left: 0;
        top: 0;
        z-index: 0;
        box-sizing: border-box;
        border: 6px solid #555;
        background-color: #1f1f1f;
        background-image:
            linear-gradient(to right, rgba(255,255,255,0.06) 1px, transparent 1px),
            linear-gradient(to bottom, rgba(255,255,255,0.06) 1px, transparent 1px);
        background-size: 50px 50px;
        display: none;
    }

    /* ============ SKILL BAR ============ */
    #skillBar {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        gap: 14px;
        z-index: 6;
    }

    .skill-slot {
        width: 60px;
        height: 60px;
        border-radius: 10px;
        background: #2a2a2a;
        border: 2px solid #555;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 14px;
        font-weight: bold;
        overflow: hidden;
    }

    .skill-slot .key-label {
        position: absolute;
        top: 3px;
        left: 6px;
        font-size: 11px;
        color: #aaa;
    }

    .skill-slot .skill-icon {
        font-size: 26px;
    }

    .skill-slot .cooldown-overlay {
        position: absolute;
        left: 0;
        bottom: 0;
        width: 100%;
        background: rgba(0,0,0,0.75);
        height: 0%;
        transition: height 0.1s linear;
    }

    .skill-slot .cooldown-text {
        position: absolute;
        font-size: 18px;
        color: #fff;
        font-weight: bold;
        z-index: 2;
        display: none;
    }

    /* ============ BLIND OVERLAY (시야 방해) ============ */
    #blindOverlay {
        position: fixed;
        inset: 0;
        background: rgba(20, 15, 5, 0.85);
        backdrop-filter: blur(6px);
        z-index: 22;
        display: none;
        pointer-events: none;
    }

    /* ============ STUN EFFECT (기절) ============ */
    .stun-icon {
        position: absolute;
        font-size: 22px;
        z-index: 4;
        pointer-events: none;
    }
</style>
</head>
<body>

    <!-- ===== MENU ===== -->
    <div id="menu">
        <h1>IO Game</h1>
        <button id="createRoomBtn">방 만들기</button>
        <div>
            <input id="roomInput" placeholder="방 코드 입력" maxlength="4">
            <button id="joinRoomBtn">입장하기</button>
        </div>
    </div>

    <!-- ===== LOBBY ===== -->
    <div id="lobby">
        <div id="lobbyRoomCode">ROOM: ----</div>

        <div id="lobbyMain">
            <div id="characterSelect"></div>
            <div id="playerList">
                <h3>대기 중인 플레이어</h3>
                <div id="playerListItems"></div>
            </div>
        </div>

        <button id="startBtn" disabled>시작</button>
        <div id="lobbyMessage"></div>
    </div>

    <!-- ===== GAME ===== -->
    <div id="mapBackground"></div>
    <div id="player"></div>
    <div id="skillBar"></div>
    <div id="blindOverlay"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
