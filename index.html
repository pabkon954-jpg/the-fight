<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My IO Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ================= 로비 UI ================= -->
    <div id="menu">

        <h2>My IO Game</h2>

        <button id="createRoomBtn">
            방 만들기
        </button>

        <br><br>

        <input
            id="roomInput"
            placeholder="4자리 방 번호 입력"
            maxlength="4"
        >

        <button id="joinRoomBtn">
            방 참가
        </button>

        <br><br>

        <div id="roomInfo">
            대기중...
        </div>

    </div>

    <!-- ================= 게임 UI ================= -->
    <div id="game">
        <div id="player"></div>
    </div>

    <!-- socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>

</body>
</html>
